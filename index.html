<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT LAB</title>
    <script>
        // Language detection and routing for GitHub Pages
        (function() {
            const lang = navigator.language.split('-')[0];
            const supportedLangs = {'pl': 'pl', 'en': 'en'};
            const targetLang = supportedLangs[lang] || 'ua';
            
            // Get the repository name (for GitHub Pages subpath)
            const currentPath = window.location.pathname;
            const isGitHubPages = currentPath.includes('/hit/');
            const baseUrl = isGitHubPages ? '/hit' : '';
            
            window.location.replace(baseUrl + '/' + targetLang + '/');
        })();
    </script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: #FFF5E6;
            margin: 0;
        }
        h1 {
            color: #1A1208;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>
        Redirecting to your language...<br>
        Перенаправлення на вашу мову...<br>
        Przekierowanie do Twojego języka...
    </h1>
</body>
</html>
